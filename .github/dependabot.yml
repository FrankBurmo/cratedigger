version: 2

updates:
  # Keep npm dependencies up to date
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 10
    groups:
      # Group all non-breaking dev dependency updates into one PR
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      # Group all non-breaking runtime dependency updates into one PR
      runtime-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch
    ignore:
      # node-taglib-sharp and better-sqlite3 are native addons —
      # pin major version bumps for manual review
      - dependency-name: node-taglib-sharp
        update-types: ["version-update:semver-major"]
      - dependency-name: better-sqlite3
        update-types: ["version-update:semver-major"]

  # Keep GitHub Actions up to date
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5
